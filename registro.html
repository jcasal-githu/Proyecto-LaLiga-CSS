        <u>
    <h1>Registro de Usuario</h1>
    </u>
    <p>Por favor, completa el siguiente formulario para registrarte:</p>
    <form action="registro.html" method="post"><!--Aqui he usado el TAG form para hacer el formulario usando diferentes tags adecuados para cada seccion-->
        <label for="username">Nombre de usuario:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="password">Sexo:</label>
        <select id="sexo" name="sexo"><br><br>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            </select><br><br>
        <label for="descripcion">Descripción personal:</label>
        <input textarea id="descripcion" name="descripcion" rows="4" cols="50" placeholder="Escribe una breve descripción sobre ti..." required></input><br><br>
        <label for="info">¿Desea recibir información adicional?</label>
        <input type="checkbox" id="info" name="info"><br><br>
        <label for="equipo">¿cual es tu equipo favorito?</label>
        <select id="equipo" name="equipo">
            <option value="Real Madrid">Real Madrid</option>
            <option value="Barcelona">Barcelona</option>
            <option value="Atletico de Madrid">Atletico de Madrid</option>
            <option value="Sevilla">Sevilla</option>
            <option value="Betis">Betis</option>
            <option value="Villarreal">Villarreal</option>
            <option value="Athletic Club">Athletic Club</option>
            <option value="Elche">Real Sociedad</option>
            <option value="Alavés">Valencia</option>
            <option value="Espanyol">Celta de Vigo</option>
        </select><br><br>
        <input type="submit" value="Enviar">
</body>
