<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <u><h1>Registro de Evento</h1></u>
</head>
<style>
    body {
        background-image: url('./imagenes2/olimpiadas.jpg');
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
        color: white;}</style>
<body><!--Aqui utilizo el comando form con sus distintos tipos de inputs dependiendo de cada situación-->
    <form action="registro_evento.html">
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
        <label for="email">Correo electronico:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="categoria">Categoria:</label>
        <select id="categoria" name="categoria">
            <option value="deporte_niños">Niños </option>
            <option value="deporte_adultos">Adultos</option>
            <option value="deporte_profesionales">Profesionales</option>
        </select><br><br>
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="5" max="50" required><br><br>
        <label for="DNI">DNI:</label>
        <input type="file" id="DNI" name="DNI" required><br><br>
        <label for="color">Color favorito:</label>
        <input type="color" id="color" name="color" value="#0000ff"><br><br>
        <input type="submit" value="Registrar">
    </form>
</body>
</html>
